<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post – DigiProp Community</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;color:#111}
    .bar{background:#0A1628;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
    .bar-logo{display:flex;align-items:center;gap:8px}
    .bar-icon{width:28px;height:28px;background:#F59E0B;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#0A1628}
    .bar-name{color:#fff;font-size:14px;font-weight:600}
    .bar-tag{color:rgba(255,255,255,.45);font-size:11px}
    .content{max-width:560px;margin:20px auto;padding:0 16px}
    .post-card{background:#fff;border-radius:16px;border:1px solid #e5e7eb;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .author-row{display:flex;align-items:center;gap:12px;padding:14px 14px 10px}
    .author-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:1.5px solid #F59E0B;flex-shrink:0}
    .author-placeholder{width:40px;height:40px;border-radius:50%;background:#0A1628;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#F59E0B;flex-shrink:0}
    .author-name{font-size:14px;font-weight:600;color:#1f2937}
    .author-sub{font-size:11px;color:#9ca3af}
    .post-img{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:#e5e7eb}
    .post-text{padding:14px;font-size:14px;color:#374151;line-height:1.6;white-space:pre-wrap;word-break:break-word}
    .counts{display:flex;gap:16px;padding:10px 14px 14px;border-top:1px solid #f3f4f6}
    .count-item{display:flex;align-items:center;gap:4px;font-size:12px;color:#6b7280}
    .cta{margin-top:16px;display:flex;flex-direction:column;gap:10px}
    .open-btn{width:100%;background:#0A1628;color:#F59E0B;font-size:14px;font-weight:700;padding:16px;border:none;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:opacity .15s}
    .open-btn:active{opacity:.8}
    .dl-link{text-align:center;font-size:12px;color:#9ca3af}
    .dl-link a{color:#d97706;font-weight:500;text-decoration:underline}
    .footer{text-align:center;padding:20px 16px;font-size:11px;color:#9ca3af}
    .spinner{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:#F59E0B;border-radius:50%;animation:spin .8s linear infinite;margin:60px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-box{padding:40px 16px;text-align:center;color:#6b7280}
  </style>
</head>
<body>

<div class="bar">
  <div class="bar-logo">
    <div class="bar-icon">DP</div>
    <span class="bar-name">DigiProp</span>
  </div>
  <span class="bar-tag">Community</span>
</div>

<div id="root"><div class="spinner"></div></div>

<script>
const FIREBASE_API_KEY = 'AIzaSyCs1uz_dfod3gh0I9m2hpUVcxUhOIBV6XQ';
const PROJECT_ID       = 'cpapp-ace05';
const BASE_URL         = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents`;

const pathParts = window.location.pathname.split('/').filter(Boolean);
const postId = pathParts[1] || pathParts[0];

function fv(field) {
  if (!field) return null;
  return field.stringValue ?? field.integerValue ?? field.doubleValue ?? field.booleanValue ?? null;
}

async function load() {
  if (!postId) { renderError('Invalid post link.'); return; }
  try {
    const res = await fetch(`${BASE_URL}/posts/${postId}?key=${FIREBASE_API_KEY}`);
    if (!res.ok) { renderError('Post not found.'); return; }
    const doc = await res.json();
    const f = doc.fields || {};
    const post = {
      id:           postId,
      authorName:   fv(f.authorName)    || 'Broker',
      authorPhoto:  fv(f.authorPhotoUrl)|| '',
      text:         fv(f.text)          || '',
      imageUrl:     fv(f.imageUrl)      || '',
      likesCount:   Number(fv(f.likesCount)    || 0),
      commentsCount:Number(fv(f.commentsCount) || 0),
    };
    render(post);
  } catch(e) {
    renderError('Could not load post.');
  }
}

function render(post) {
  const deepLink = `cpapp://post/${post.id}`;
  document.title = `${post.authorName} on DigiProp Community`;

  document.getElementById('root').innerHTML = `
    <div class="content">
      <div class="post-card">
        <div class="author-row">
          ${post.authorPhoto
            ? `<img class="author-avatar" src="${post.authorPhoto}" alt="${post.authorName}" onerror="this.outerHTML='<div class=&quot;author-placeholder&quot;>${post.authorName[0]?.toUpperCase()}</div>'" />`
            : `<div class="author-placeholder">${post.authorName[0]?.toUpperCase() || 'B'}</div>`}
          <div>
            <div class="author-name">${post.authorName}</div>
            <div class="author-sub">DigiProp Community</div>
          </div>
        </div>
        ${post.imageUrl ? `<img class="post-img" src="${post.imageUrl}" alt="Post image" />` : ''}
        ${post.text ? `<div class="post-text">${post.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : ''}
        <div class="counts">
          <div class="count-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#ef4444" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
            ${post.likesCount}
          </div>
          <div class="count-item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            ${post.commentsCount}
          </div>
        </div>
      </div>

      <div class="cta">
        <button class="open-btn" onclick="openApp('${deepLink}')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
          Open in DigiProp App
        </button>
        <p class="dl-link">Don't have the app? <a href="https://play.google.com/store/apps/details?id=com.digiprop.cpapp">Download DigiProp</a></p>
      </div>
    </div>

    <div class="footer">Powered by <strong>DigiProp</strong></div>
  `;
}

function renderError(msg) {
  document.getElementById('root').innerHTML = `<div class="error-box"><p style="font-size:32px;margin-bottom:12px">💬</p><p>${msg}</p></div>`;
}

function openApp(deepLink) {
  const btn = document.querySelector('.open-btn');
  if (btn) btn.textContent = 'Opening…';
  window.location.href = deepLink;
  setTimeout(() => {
    window.location.href = 'https://play.google.com/store/apps/details?id=com.digiprop.cpapp';
  }, 2500);
}

load();
</script>
</body>
</html>
