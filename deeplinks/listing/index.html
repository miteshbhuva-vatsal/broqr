<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property – DigiProp</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;color:#111}
    .bar{background:#0A1628;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
    .bar-logo{display:flex;align-items:center;gap:8px}
    .bar-icon{width:28px;height:28px;background:#F59E0B;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#0A1628}
    .bar-name{color:#fff;font-size:14px;font-weight:600}
    .bar-tag{color:rgba(255,255,255,.45);font-size:11px}
    .hero{position:relative;height:220px;background:#e5e7eb;overflow:hidden}
    .hero img{width:100%;height:100%;object-fit:cover}
    .hero-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6),transparent)}
    .hero-badge{position:absolute;bottom:12px;left:12px;background:#F59E0B;color:#0A1628;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
    .hero-count{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.5);color:#fff;font-size:10px;padding:3px 8px;border-radius:20px}
    .card{background:#fff;border-bottom:1px solid #e5e7eb;padding:20px 16px}
    .price{font-size:26px;font-weight:900;color:#0A1628}
    .orig-price{font-size:13px;color:#9ca3af;text-decoration:line-through;margin-left:8px}
    .meta{display:flex;flex-direction:column;gap:4px;margin-top:8px}
    .meta-row{display:flex;align-items:center;gap:6px;font-size:13px;color:#6b7280}
    .meta-row svg{flex-shrink:0;color:#F59E0B}
    .broker{display:flex;align-items:center;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid #f3f4f6}
    .broker-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #F59E0B}
    .broker-avatar-placeholder{width:36px;height:36px;border-radius:50%;background:#0A1628;display:flex;align-items:center;justify-content:center;color:#F59E0B;font-size:14px;font-weight:700;flex-shrink:0}
    .broker-label{font-size:10px;color:#9ca3af}
    .broker-name{font-size:13px;font-weight:600;color:#1f2937}
    .desc-card{background:#fff;margin-top:8px;padding:16px}
    .section-label{font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
    .desc-text{font-size:13px;color:#374151;line-height:1.6;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
    .cta{padding:20px 16px;display:flex;flex-direction:column;gap:12px}
    .open-btn{width:100%;background:#0A1628;color:#F59E0B;font-size:14px;font-weight:700;padding:16px;border:none;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:opacity .15s}
    .open-btn:active{opacity:.8}
    .dl-link{text-align:center;font-size:12px;color:#9ca3af}
    .dl-link a{color:#d97706;font-weight:500;text-decoration:underline}
    .footer{text-align:center;padding:16px;font-size:11px;color:#9ca3af;border-top:1px solid #e5e7eb;background:#fff}
    .skeleton{background:#e5e7eb;border-radius:6px;animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .error-box{padding:40px 16px;text-align:center;color:#6b7280}
    .spinner{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:#F59E0B;border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div class="bar">
  <div class="bar-logo">
    <div class="bar-icon">DP</div>
    <span class="bar-name">DigiProp</span>
  </div>
  <span class="bar-tag">Property Detail</span>
</div>

<div id="root"><div class="spinner"></div></div>

<script>
const FIREBASE_API_KEY = 'AIzaSyCs1uz_dfod3gh0I9m2hpUVcxUhOIBV6XQ';
const PROJECT_ID       = 'cpapp-ace05';
const BASE_URL         = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents`;

// Parse listing ID from URL path: /listing/{id}
const pathParts = window.location.pathname.split('/').filter(Boolean);
const listingId = pathParts[1] || pathParts[0];

function fv(field) {
  if (!field) return null;
  return field.stringValue ?? field.integerValue ?? field.doubleValue ??
         field.booleanValue ?? null;
}
function fa(field) {
  if (!field?.arrayValue?.values) return [];
  return field.arrayValue.values.map(v => fv(v)).filter(Boolean);
}
function formatPrice(p) {
  if (!p) return '—';
  if (p >= 10000000) return '₹' + (p / 10000000).toFixed(2) + ' Cr';
  if (p >= 100000)   return '₹' + (p / 100000).toFixed(2) + ' L';
  return '₹' + Number(p).toLocaleString('en-IN');
}

async function load() {
  if (!listingId) { renderError('Invalid listing link.'); return; }
  try {
    const res = await fetch(`${BASE_URL}/listings/${listingId}?key=${FIREBASE_API_KEY}`);
    if (!res.ok) { renderError('Listing not found.'); return; }
    const doc = await res.json();
    const f = doc.fields || {};
    const l = {
      id:           listingId,
      category:     fv(f.category)    || 'Property',
      price:        Number(fv(f.price) || 0),
      origPrice:    Number(fv(f.originalPrice) || 0),
      location:     fv(f.location)    || '',
      city:         fv(f.city)        || '',
      area:         fv(f.area)        || '',
      areaUnit:     fv(f.areaUnit)    || 'sq ft',
      heroImageUrl: fv(f.heroImageUrl)|| '',
      images:       fa(f.images),
      brokerName:   fv(f.brokerName)  || '',
      brokerPhoto:  fv(f.brokerPhotoUrl) || '',
      description:  fv(f.description) || '',
    };
    render(l);
  } catch(e) {
    renderError('Could not load listing.');
  }
}

function render(l) {
  const imgs = l.images.length ? l.images : (l.heroImageUrl ? [l.heroImageUrl] : []);
  const price = formatPrice(l.price);
  const origPrice = l.origPrice > 0 ? formatPrice(l.origPrice) : '';
  const deepLink = `cpapp://listing/${l.id}`;
  document.title = `${l.category} in ${l.city} – ${price} | DigiProp`;

  document.getElementById('root').innerHTML = `
    ${imgs.length ? `
    <div class="hero">
      <img src="${imgs[0]}" alt="Property" onerror="this.parentElement.style.display='none'" />
      <div class="hero-gradient"></div>
      <span class="hero-badge">${l.category}</span>
      ${imgs.length > 1 ? `<span class="hero-count">+${imgs.length - 1} photos</span>` : ''}
    </div>` : ''}

    <div class="card">
      <div>
        <span class="price">${price}</span>
        ${origPrice ? `<span class="orig-price">${origPrice}</span>` : ''}
      </div>
      <div class="meta">
        ${l.location ? `<div class="meta-row">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${l.location}${l.city ? ', ' + l.city : ''}
        </div>` : ''}
        ${l.area ? `<div class="meta-row">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
          ${l.area} ${l.areaUnit}
        </div>` : ''}
      </div>
      ${l.brokerName ? `
      <div class="broker">
        ${l.brokerPhoto
          ? `<img class="broker-avatar" src="${l.brokerPhoto}" alt="${l.brokerName}" onerror="this.outerHTML='<div class=&quot;broker-avatar-placeholder&quot;>${l.brokerName[0]?.toUpperCase()}</div>'" />`
          : `<div class="broker-avatar-placeholder">${l.brokerName[0]?.toUpperCase() || 'B'}</div>`}
        <div>
          <div class="broker-label">Listed by</div>
          <div class="broker-name">${l.brokerName}</div>
        </div>
      </div>` : ''}
    </div>

    ${l.description ? `
    <div class="desc-card">
      <div class="section-label">About</div>
      <p class="desc-text">${l.description}</p>
    </div>` : ''}

    <div class="cta">
      <button class="open-btn" onclick="openApp('${deepLink}')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
        Open in DigiProp App
      </button>
      <p class="dl-link">Don't have the app? <a href="https://play.google.com/store/apps/details?id=com.digiprop.cpapp">Download DigiProp</a></p>
    </div>

    <div class="footer">Powered by <strong>DigiProp</strong></div>
  `;
}

function renderError(msg) {
  document.getElementById('root').innerHTML = `<div class="error-box"><p style="font-size:32px;margin-bottom:12px">🏠</p><p>${msg}</p><div class="cta"><a href="https://play.google.com/store/apps/details?id=com.digiprop.cpapp" class="open-btn" style="text-decoration:none">Download DigiProp</a></div></div>`;
}

function openApp(deepLink) {
  const btn = document.querySelector('.open-btn');
  if (btn) btn.textContent = 'Opening…';
  window.location.href = deepLink;
  setTimeout(() => {
    window.location.href = 'https://play.google.com/store/apps/details?id=com.digiprop.cpapp';
  }, 2500);
}

load();
</script>
</body>
</html>
